name: E2E (AWS Terraform — manual)

# Manual-only: this provisions a REAL ECR repository and needs AWS credentials.
# Configure the repository secrets/variables documented in the README before
# running (Settings → Secrets and variables → Actions):
#   secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   variables: AWS_REGION, AWS_ACCOUNT_ID
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      CLUSTER_NAME: radius-e2e
      LOCAL_REGISTRY: localhost
      IMAGE_TAG: e2e
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install kind
        uses: helm/kind-action@v1
        with:
          install_only: true

      - name: Create kind cluster
        run: kind create cluster --name "$CLUSTER_NAME" --wait 120s

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: radius/go.mod
          cache-dependency-path: radius/go.sum

      - name: Build control-plane images
        working-directory: radius
        run: |
          make docker-build-applications-rp \
            DOCKER_REGISTRY="$LOCAL_REGISTRY" \
            DOCKER_TAG_VERSION="$IMAGE_TAG"
          make docker-build-dynamic-rp \
            DOCKER_REGISTRY="$LOCAL_REGISTRY" \
            DOCKER_TAG_VERSION="$IMAGE_TAG"

      - name: Side-load images into kind
        run: |
          kind load docker-image "$LOCAL_REGISTRY/applications-rp:$IMAGE_TAG" --name "$CLUSTER_NAME"
          kind load docker-image "$LOCAL_REGISTRY/dynamic-rp:$IMAGE_TAG" --name "$CLUSTER_NAME"
          # The terraform-init init container pulls alpine from Docker Hub,
          # which is rate-limited anonymously in CI. Side-load it.
          docker pull alpine:3.23
          kind load docker-image alpine:3.23 --name "$CLUSTER_NAME"

      - name: Run E2E (AWS Terraform)
        uses: ./.github/actions/radius-aws-terraform-e2e
        with:
          applications-rp-image: ${{ env.LOCAL_REGISTRY }}/applications-rp
          dynamic-rp-image: ${{ env.LOCAL_REGISTRY }}/dynamic-rp
          image-tag: ${{ env.IMAGE_TAG }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Cleanup cluster
        if: always()
        run: kind delete cluster --name "$CLUSTER_NAME" 2>/dev/null || true
