name: Run Radius Azure direct-module E2E (AVM Bicep)
description: >
  Cluster-agnostic Radius install (applications-rp + dynamic-rp built from the
  radius submodule) plus platform-engineer setup, developer deploy, and verify
  for direct module support against a STANDARD Azure Verified Module
  (avm/res/storage/storage-account). Provisions a REAL Azure storage account via
  the Radius deployment engine, so it needs Azure credentials and is intended to
  be run manually (workflow_dispatch). Assumes kubeconfig is configured against
  the target cluster, the control-plane images are reachable from the cluster,
  and the target resource group already exists.

inputs:
  applications-rp-image:
    description: Image repo (no tag) for the applications-rp container. Serves Radius.Core/recipePacks with the new `outputs` field.
    required: true
  dynamic-rp-image:
    description: Image repo (no tag) for the dynamic-rp container. Runs the recipe engine (direct-module parsing, parameter resolution, outputs mapping).
    required: true
  image-tag:
    description: Shared tag for the locally built control-plane images.
    required: true
  image-pull-secret-name:
    description: Optional docker-registry secret to attach as global.imagePullSecrets (cloud clusters). Empty for kind/k3d.
    required: false
    default: ""
  azure-client-id:
    description: Service principal client ID registered with Radius (`rad credential register azure sp`).
    required: true
  azure-client-secret:
    description: Service principal client secret paired with azure-client-id.
    required: true
  azure-tenant-id:
    description: Azure tenant (directory) ID for the service principal.
    required: true
  azure-subscription-id:
    description: Azure subscription ID the environment provisions resources into (sets the environment Azure provider scope).
    required: true
  azure-resource-group:
    description: Azure resource group the environment provisions resources into. Must already exist.
    required: true
  storage-account-name:
    description: Globally-unique storage account name (3-24 lowercase alphanumerics) for this run.
    required: true

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: radius/go.mod
        cache-dependency-path: radius/go.sum

    - name: Install Radius CLI
      shell: bash
      working-directory: radius
      run: |
        make build-binaries
        sudo cp dist/linux_amd64/release/rad /usr/local/bin/rad
        rad version

    - name: Set up Node.js
      # Required to generate the Radius core Bicep types from the submodule.
      uses: actions/setup-node@v4
      with:
        node-version-file: radius/.node-version

    - name: Install yq and the Bicep CLI
      shell: bash
      env:
        BICEP_VER: v0.42.1
        YQ_VERSION: v4.44.3
      run: |
        # yq is required by `make generate-bicep-types` (contrib namespaces).
        sudo curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq
        # The standalone Bicep CLI publishes the Radius core extension index.
        curl -Lo bicep "https://github.com/Azure/bicep/releases/download/${BICEP_VER}/bicep-linux-x64"
        chmod +x ./bicep && sudo mv ./bicep /usr/local/bin/bicep
        yq --version && bicep --version

    - name: Install Radius from the worktree chart
      shell: bash
      working-directory: radius
      env:
        APPLICATIONS_RP_IMAGE: ${{ inputs.applications-rp-image }}
        DYNAMIC_RP_IMAGE: ${{ inputs.dynamic-rp-image }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        IMAGE_PULL_SECRET: ${{ inputs.image-pull-secret-name }}
      run: |
        EXTRA=""
        if [ -n "$IMAGE_PULL_SECRET" ]; then
          kubectl create namespace radius-system 2>/dev/null || true
          EXTRA="--set global.imagePullSecrets[0].name=$IMAGE_PULL_SECRET"
        fi
        # The recipePack `outputs` field is served by applications-rp (rp.*), and
        # the recipe engine runs in dynamic-rp (dynamicrp.*). The Bicep recipe is
        # deployed by the deployment engine (de.*), which uses the chart default
        # (released) image and the registered Azure credential to deploy the AVM.
        rad install kubernetes \
          --reinstall \
          --chart deploy/Chart \
          --set rp.image=$APPLICATIONS_RP_IMAGE \
          --set rp.tag=$IMAGE_TAG \
          --set dynamicrp.image=$DYNAMIC_RP_IMAGE \
          --set dynamicrp.tag=$IMAGE_TAG \
          $EXTRA
        kubectl wait --for=condition=available deployment --all -n radius-system --timeout=300s

    - name: '[PE] Create workspace, group, and environment'
      shell: bash
      run: |
        rad group create default
        rad env create default --preview --group default
        rad workspace create kubernetes default \
          --context "$(kubectl config current-context)" \
          --group default
        rad workspace switch default
        rad env switch default --preview

    - name: '[PE] Register Azure credentials with Radius'
      shell: bash
      env:
        AZURE_CLIENT_ID: ${{ inputs.azure-client-id }}
        AZURE_CLIENT_SECRET: ${{ inputs.azure-client-secret }}
        AZURE_TENANT_ID: ${{ inputs.azure-tenant-id }}
      run: |
        # The deployment engine fetches this service principal from UCP to
        # authenticate to Azure ARM when deploying the AVM module.
        rad credential register azure sp \
          --client-id "$AZURE_CLIENT_ID" \
          --client-secret "$AZURE_CLIENT_SECRET" \
          --tenant-id "$AZURE_TENANT_ID"

    - name: '[PE] Register resource type'
      shell: bash
      run: make register-types-azure

    - name: '[PE] Build Bicep extensions'
      shell: bash
      run: |
        # Builds the local extensions referenced by demo-azure/bicepconfig.json:
        #  - radius-extension.tgz: the Radius core types from the submodule,
        #    including the new recipePack `outputs` field.
        #  - storageaccounts-extension.tgz: the Demo.Azure/storageAccounts type.
        rad bicep download
        make build-azure

    - name: '[PE] Provision recipe pack and environment'
      shell: bash
      working-directory: demo-azure
      env:
        AZURE_SUBSCRIPTION_ID: ${{ inputs.azure-subscription-id }}
        AZURE_RESOURCE_GROUP: ${{ inputs.azure-resource-group }}
      run: |
        # platform.bicep sets the environment Azure provider scope (subscription +
        # resource group) and points the recipe at an AVM pinned `:<tag>`.
        rad deploy platform.bicep \
          --parameters azureSubscriptionId="$AZURE_SUBSCRIPTION_ID" \
          --parameters azureResourceGroup="$AZURE_RESOURCE_GROUP"

    - name: '[Developer] Deploy application'
      shell: bash
      working-directory: demo-azure
      env:
        STORAGE_ACCOUNT_NAME: ${{ inputs.storage-account-name }}
      run: |
        rad deploy app.bicep --parameters accountName="$STORAGE_ACCOUNT_NAME"

    - name: '[Verify] Recipe outputs mapped onto resource properties'
      shell: bash
      env:
        STORAGE_ACCOUNT_NAME: ${{ inputs.storage-account-name }}
      run: |
        # The `outputs` mapping should have populated accountId and
        # location from the AVM's outputs. Empty values mean the
        # module did not run or the mapping was dropped.
        JSON=$(rad resource show Demo.Azure/storageAccounts demo-storage -o json)
        ACCOUNT_ID=$(echo "$JSON" | jq -r '.properties.accountId // ""')
        LOCATION=$(echo "$JSON" | jq -r '.properties.location // ""')
        echo "accountId=$ACCOUNT_ID location=$LOCATION"
        test -n "$ACCOUNT_ID"
        test -n "$LOCATION"
        # accountId ends with the unique name we passed, proving the
        # {{context.resource.properties.accountName}} expression resolved and the
        # module's `resourceId` output was mapped back.
        case "$ACCOUNT_ID" in */"$STORAGE_ACCOUNT_NAME") ;; *) echo "unexpected accountId: $ACCOUNT_ID"; exit 1 ;; esac
        echo "Resource properties populated from module outputs"

    - name: '[Verify] Storage account exists in Azure'
      shell: bash
      env:
        STORAGE_ACCOUNT_NAME: ${{ inputs.storage-account-name }}
        AZURE_RESOURCE_GROUP: ${{ inputs.azure-resource-group }}
      run: |
        az storage account show \
          --name "$STORAGE_ACCOUNT_NAME" \
          --resource-group "$AZURE_RESOURCE_GROUP" \
          --query "{name:name, provisioningState:provisioningState}" -o json
        echo "Standard Azure Verified Module created storage account $STORAGE_ACCOUNT_NAME"

    - name: Dump diagnostics on failure
      if: failure()
      shell: bash
      run: |
        echo "=== Pods ==="
        kubectl get pods --all-namespaces
        echo ""
        echo "=== dynamic-rp logs (recipe engine) ==="
        kubectl logs -n radius-system -l app.kubernetes.io/name=dynamic-rp -c dynamic-rp --tail=200 2>/dev/null || true
        echo ""
        echo "=== applications-rp logs (recipePacks) ==="
        kubectl logs -n radius-system -l app.kubernetes.io/name=applications-rp -c applications-rp --tail=200 2>/dev/null || true
        echo ""
        echo "=== deployment-engine logs (Bicep/AVM deploy) ==="
        kubectl logs -n radius-system -l app.kubernetes.io/name=bicep-de --tail=200 2>/dev/null \
          || kubectl logs -n radius-system -l control-plane=bicep-de --tail=200 2>/dev/null || true
        echo ""
        echo "=== Resource ==="
        rad resource show Demo.Azure/storageAccounts demo-storage 2>/dev/null || true

    - name: Cleanup Radius resources
      if: always()
      shell: bash
      run: |
        # The resource group is deleted by the calling workflow, which removes the
        # storage account; this just tidies up the Radius application record.
        rad application delete direct-module-azure-demo --yes 2>/dev/null || true
