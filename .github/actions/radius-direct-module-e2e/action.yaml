name: Run Radius direct-module E2E
description: >
  Cluster-agnostic Radius install (applications-rp + dynamic-rp built from the
  radius submodule) plus platform-engineer setup, developer deploy, and verify
  for the direct module support feature. Assumes kubeconfig is already
  configured against the target cluster and the control-plane images are
  reachable from the cluster (side-loaded for kind/k3d, or pushed to a registry
  the cluster can pull from).

inputs:
  applications-rp-image:
    description: Image repo (no tag) for the applications-rp container. Serves Radius.Core/recipePacks with the new `outputs` field.
    required: true
  dynamic-rp-image:
    description: Image repo (no tag) for the dynamic-rp container. Runs the recipe engine (direct-module parsing, parameter resolution, outputs mapping).
    required: true
  image-tag:
    description: Shared tag for the locally built control-plane images.
    required: true
  module-template-path:
    description: "git:: URL the direct Terraform module recipe is fetched from."
    required: true
  image-pull-secret-name:
    description: Optional docker-registry secret to attach as global.imagePullSecrets (cloud clusters). Empty for kind/k3d.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: radius/go.mod
        cache-dependency-path: radius/go.sum

    - name: Install Radius CLI
      shell: bash
      working-directory: radius
      run: |
        make build-binaries
        sudo cp dist/linux_amd64/release/rad /usr/local/bin/rad
        rad version

    - name: Install Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_wrapper: false

    - name: Set up Node.js
      # Required to generate the Radius core Bicep types from the submodule.
      uses: actions/setup-node@v4
      with:
        node-version-file: radius/.node-version

    - name: Install yq and the Bicep CLI
      shell: bash
      env:
        BICEP_VER: v0.42.1
        YQ_VERSION: v4.44.3
      run: |
        # yq is required by `make generate-bicep-types` (contrib namespaces).
        sudo curl -fsSL "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" -o /usr/local/bin/yq
        sudo chmod +x /usr/local/bin/yq
        # The standalone Bicep CLI publishes the Radius core extension index.
        curl -Lo bicep "https://github.com/Azure/bicep/releases/download/${BICEP_VER}/bicep-linux-x64"
        chmod +x ./bicep && sudo mv ./bicep /usr/local/bin/bicep
        yq --version && bicep --version

    - name: Install Radius from the worktree chart
      shell: bash
      working-directory: radius
      env:
        APPLICATIONS_RP_IMAGE: ${{ inputs.applications-rp-image }}
        DYNAMIC_RP_IMAGE: ${{ inputs.dynamic-rp-image }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        IMAGE_PULL_SECRET: ${{ inputs.image-pull-secret-name }}
      run: |
        EXTRA=""
        if [ -n "$IMAGE_PULL_SECRET" ]; then
          # Ensure the pull secret exists in radius-system before the
          # deployment tries to pull. rad install creates the namespace,
          # so create it ourselves first if needed.
          kubectl create namespace radius-system 2>/dev/null || true
          EXTRA="--set global.imagePullSecrets[0].name=$IMAGE_PULL_SECRET"
        fi
        # The recipePack `outputs` field is served by applications-rp (rp.*),
        # and the recipe engine runs in dynamic-rp (dynamicrp.*); both must be
        # the locally built images for the feature to be exercised end to end.
        rad install kubernetes \
          --reinstall \
          --chart deploy/Chart \
          --set rp.image=$APPLICATIONS_RP_IMAGE \
          --set rp.tag=$IMAGE_TAG \
          --set dynamicrp.image=$DYNAMIC_RP_IMAGE \
          --set dynamicrp.tag=$IMAGE_TAG \
          $EXTRA
        kubectl wait --for=condition=available deployment --all -n radius-system --timeout=300s

    - name: '[PE] Create workspace, group, and environment'
      shell: bash
      run: |
        rad group create default
        rad env create default --preview --group default
        rad workspace create kubernetes default \
          --context "$(kubectl config current-context)" \
          --group default
        rad workspace switch default
        rad env switch default --preview

    - name: '[PE] Register resource type'
      shell: bash
      run: make register-types

    - name: '[PE] Build Bicep extensions'
      shell: bash
      run: |
        # Builds two local extensions referenced by demo/bicepconfig.json:
        #  - radius-extension.tgz: the Radius core types from the submodule,
        #    including the new recipePack `outputs` field (not yet in the
        #    published `br:biceptypes.azurecr.io/radius` types).
        #  - redisCaches-extension.tgz: the demo's custom resource type.
        rad bicep download
        make build

    - name: '[PE] Provision recipe pack and environment'
      shell: bash
      working-directory: demo
      env:
        MODULE_TEMPLATE_PATH: ${{ inputs.module-template-path }}
      run: |
        rad deploy platform.bicep -p moduleTemplatePath="${MODULE_TEMPLATE_PATH}"

    - name: '[Developer] Deploy application'
      shell: bash
      working-directory: demo
      run: rad deploy app.bicep

    - name: '[Verify] Recipe outputs mapped onto resource properties'
      shell: bash
      run: |
        # The `outputs` mapping should have populated endpoint + port from the
        # standard module's outputs. Empty values mean the mapping did not run.
        JSON=$(rad resource show Demo.Datastores/redisCaches demo-redis -o json)
        ENDPOINT=$(echo "$JSON" | jq -r '.properties.endpoint // ""')
        PORT=$(echo "$JSON" | jq -r '.properties.port // ""')
        echo "endpoint=$ENDPOINT port=$PORT"
        test -n "$ENDPOINT"
        test "$PORT" = "6379"
        # endpoint is <name>.<namespace>.svc.cluster.local — proves the
        # {{context.resource.name}} expression resolved to the resource name.
        echo "$ENDPOINT" | grep -q '^demo-redis\.'
        NS=$(echo "$ENDPOINT" | cut -d. -f2)
        echo "NS=$NS" >> "$GITHUB_ENV"
        echo "Resource properties populated from module outputs"

    - name: '[Verify] Standard module executed in the cluster'
      shell: bash
      run: |
        kubectl wait --for=condition=available deployment/demo-redis -n "$NS" --timeout=180s
        kubectl get service demo-redis -n "$NS"
        echo "Standard Terraform module deployed Redis into namespace $NS"

    - name: Dump diagnostics on failure
      if: failure()
      shell: bash
      run: |
        echo "=== Pods ==="
        kubectl get pods --all-namespaces
        echo ""
        echo "=== dynamic-rp logs (recipe engine) ==="
        kubectl logs -n radius-system -l app.kubernetes.io/name=dynamic-rp -c dynamic-rp --tail=200 2>/dev/null || true
        echo ""
        echo "=== applications-rp logs (recipePacks) ==="
        kubectl logs -n radius-system -l app.kubernetes.io/name=applications-rp -c applications-rp --tail=200 2>/dev/null || true
        echo ""
        echo "=== terraform-init logs ==="
        kubectl logs -n radius-system -l app.kubernetes.io/name=dynamic-rp -c terraform-init --tail=100 2>/dev/null || true
        echo ""
        echo "=== Resource ==="
        rad resource show Demo.Datastores/redisCaches demo-redis 2>/dev/null || true

    - name: Cleanup Radius resources
      if: always()
      shell: bash
      run: rad application delete direct-module-demo 2>/dev/null || true
